<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>FXSCALE Mindmap</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0A0A0F; color: #E0E0E0; font-family: 'Outfit', sans-serif; overflow: hidden; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1a1a2e; }
      ::-webkit-scrollbar-thumb { background: #4ECDC4; border-radius: 3px; }
      /* Auth loading screen */
      #authScreen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0A0A0F;
      }
      #authScreen.hidden { display: none; }
      #root.auth-hidden { display: none; }
      .auth-logo {
        font-family: 'Space Mono', monospace;
        font-size: 2rem; font-weight: 700;
        background: linear-gradient(135deg, #4ECDC4, #A78BFA);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .auth-sub {
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem; color: #555; margin-top: 12px; letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Auth Guard -->
    <div id="authScreen">
      <div style="text-align:center">
        <div class="auth-logo">FXSCALE Mindmap</div>
        <div class="auth-sub">Vérification de l'authentification...</div>
      </div>
    </div>

    <div id="root" class="auth-hidden"></div>

    <script>
      (function() {
        const AUTH_SERVICE = 'https://fxscale-auth-production.up.railway.app';
        const CURRENT_URL = window.location.origin + window.location.pathname;

        // Check for token in URL (redirect back from auth service)
        const params = new URLSearchParams(window.location.search);
        const urlToken = params.get('auth_token');
        if (urlToken) {
          localStorage.setItem('fxscale_auth_token', urlToken);
          window.history.replaceState({}, '', window.location.pathname);
        }

        function showApp(user) {
          document.getElementById('authScreen').classList.add('hidden');
          document.getElementById('root').classList.remove('auth-hidden');
          window.__fxscale_user = user || null;
          window.__fxscale_authenticated = true;
        }

        function goLogin() {
          window.location.href = AUTH_SERVICE + '/login?redirect=' + encodeURIComponent(CURRENT_URL);
        }

        const token = localStorage.getItem('fxscale_auth_token');

        if (token) {
          // Validate existing localStorage token
          fetch(AUTH_SERVICE + '/auth/verify-token?token=' + encodeURIComponent(token), { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
              if (data.valid) {
                showApp(data.user);
              } else {
                localStorage.removeItem('fxscale_auth_token');
                goLogin();
              }
            })
            .catch(() => showApp());
        } else {
          // No localStorage token — try cookie-based auth (SSO from other projects)
          fetch(AUTH_SERVICE + '/auth/verify-token', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
              if (data.valid && data.token) {
                // SSO success — store token locally for future refreshes
                localStorage.setItem('fxscale_auth_token', data.token);
                showApp(data.user);
              } else {
                goLogin();
              }
            })
            .catch(() => goLogin());
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
